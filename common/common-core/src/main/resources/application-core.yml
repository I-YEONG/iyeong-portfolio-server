spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    # 1. 쿼리 로그를 콘솔에 예쁘게 찍어줍니다. (테이블 생성 확인용)
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        # 2. PostgreSQL 전용 문법을 사용하도록 명시합니다.
        dialect: org.hibernate.dialect.PostgreSQLDialect
        # 3. DB 스캔 및 테이블 생성 전략
        hbm2ddl:
          auto: update

    # 4. 중요: 테이블 생성을 시도하도록 다시 한번 명시
    hibernate:
      ddl-auto: update

# Supabase 스토리지 연결 설정
supabase:
  url: "https://hiqyqzmyoxafmrrspntv.supabase.co"
  service-key: ${DB_KEY}